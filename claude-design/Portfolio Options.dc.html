<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<meta name="design_doc_mode" content="canvas">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
<script type="text/babel" src="./browser-window.jsx"></script>
<style>
  body { margin: 0; background: #f0eee9; font-family: 'Noto Sans JP', system-ui, sans-serif; }
  .dv-turn { padding: 40px 44px 32px; scroll-margin-top: 16px; }
  .dv-thd { display: flex; align-items: baseline; gap: 10px; margin: 0 0 20px; }
  .dv-tid { font: 600 10px ui-monospace, Menlo, monospace; padding: 3px 7px; background: #1a1a1a; color: #fff; border-radius: 4px; text-decoration: none; }
  .dv-tname { font: 600 13px/1.2 system-ui, sans-serif; color: #1a1a1a; }
  .dv-opts { display: flex; flex-wrap: wrap; gap: 28px; align-items: flex-start; }
  .dv-opt { flex: none; display: flex; flex-direction: column; gap: 9px; scroll-margin-top: 16px; }
  .dv-oid { font: 600 10.5px ui-monospace, Menlo, monospace; padding: 3px 7px; background: rgba(0,0,0,.08); color: #1a1a1a; border-radius: 5px; text-decoration: none; }
  .dv-olabel { display: flex; align-items: baseline; gap: 8px; font: 400 11px/1.3 system-ui, sans-serif; color: rgba(0,0,0,.55); }
  .dv-card { max-width: 100%; border-radius: 8px; overflow: hidden; }
  .dv-opt:target .dv-oid { background: #2a78d6; color: #fff; }
  .dv-next { margin: 22px 0 0; font: 12px/1.5 system-ui, sans-serif; color: rgba(0,0,0,.5); }
</style>
</helmet>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#1a1a2e"/><text x="50" y="56" font-size="30" text-anchor="middle" fill="#7fb0ff" font-family="monospace">&gt;_</text></svg>
</template>

<section class="dv-turn" id="t1">
  <div class="dv-thd"><a class="dv-tid" href="#t1">1</a><span class="dv-tname">スキルシート公開サイト — デザイン比較</span></div>
  <div class="dv-opts">

    <div class="dv-opt" id="1a">
      <div class="dv-olabel"><a class="dv-oid" href="#1a">1a</a>ライト / ペール配色・柔らかい印象</div>
      <div class="dv-card">
        <x-import component-from-global-scope="ChromeWindow" from="./browser-window.jsx" url="engineer-portfolio.dev" width="{{ 1180 }}" height="{{ 760 }}" hint-size="1180px,760px">
          <dc-import name="Portfolio A" hint-size="1180px,760px"></dc-import>
        </x-import>
      </div>
    </div>

    <div class="dv-opt" id="1b">
      <div class="dv-olabel"><a class="dv-oid" href="#1b">1b</a>ダーク / ターミナル調・エンジニアらしいスタイリッシュさ</div>
      <div class="dv-card">
        <x-import component-from-global-scope="ChromeWindow" from="./browser-window.jsx" url="engineer-portfolio.dev" width="{{ 1180 }}" height="{{ 760 }}" hint-size="1180px,760px">
          <dc-import name="Portfolio B" hint-size="1180px,760px"></dc-import>
        </x-import>
      </div>
    </div>

  </div>
  <p class="dv-next">Try next: "<a class="dv-oid" href="#1a">1a</a>をベースに全体を採用したい" ・ "<a class="dv-oid" href="#1b">1b</a>のダーク配色で経歴ページの見せ方を変えたい" ・ "2案を混ぜたい"</p>
</section>

</x-dc>
</body>
</html>
